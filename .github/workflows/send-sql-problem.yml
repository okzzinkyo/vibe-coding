name: SQL Daily Problem

on:
  schedule:
    # KST 오전 8시 = UTC 전날 23시 (일~목 UTC = 월~금 KST)
    - cron: '0 23 * * 0-4'
  workflow_dispatch: # 수동 테스트용

jobs:
  send-problem:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: sql-daily/package.json

      - name: Install dependencies
        run: npm install
        working-directory: sql-daily

      - name: Send SQL problem
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: node send.js
        working-directory: sql-daily
